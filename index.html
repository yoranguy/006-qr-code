<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title><!-- Frontend Mentor | -->QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body{
      background-color: #d5e1ef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .main{
      border-radius: 10px;
      padding: 15px; 
      background-color: #ffffff;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .heading{
      font-size: 1.5rem;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      
      text-align: center;
      margin-top: 15px;
      color: #38465f;
    }

    .text{
      font-size: 1rem;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0 15px 20px;
      color: #38465f;
    }


    .img-qr-code{
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="main" class="main">
  <img src="images/image-qr-code.png" alt="QR code image" class="img-qr-code">


<h1 id="heading" class="heading">Improve your front-end skills by building projects</h1>
  <p id="text" class ="text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
</div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">yoranguy</a>. 
  </footer>
-->
</body>
</html>
